<!DOCTYPE html>
<html>
<head>
<title>Menu Produk</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f3fff6;
}

nav{
background:#17a673;
padding:12px;
display:flex;
justify-content:center;
gap:20px;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
}

.card{
background:white;
padding:15px;
border-radius:8px;
text-align:center;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

button{
background:#17a673;
color:white;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
}

</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="menu.html">Menu</a>
<a href="keranjang.html">Keranjang</a>
<a href="lokasi.html">Lokasi</a>
</nav>

<div class="container">

<h2>Menu Produk</h2>

<div class="menu">

<div class="card">
<h3>Es Teler Yummy</h3>
<button onclick="tambah('Es Teler Yummy')">Tambah</button>
</div>

<div class="card">
<h3>Es Coklat</h3>
<button onclick="tambah('Es Coklat')">Tambah</button>
</div>

<div class="card">
<h3>Rokupang (Roti Kukus/Panggang)</h3>
<button onclick="tambah('Rokupang')">Tambah</button>
</div>

</div>

</div>

<script>

function tambah(menu){

let keranjang = JSON.parse(localStorage.getItem("keranjang")) || [];

keranjang.push(menu);

localStorage.setItem("keranjang",JSON.stringify(keranjang));

alert("Produk ditambahkan ke keranjang");

}

</script>

</body>
</html>
