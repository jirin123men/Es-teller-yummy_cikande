<!DOCTYPE html>
<html>
<head>
<title>Menu Produk</title>

<style>

body{font-family:Arial;margin:0;background:#f3fff6;}

nav{
background:#17a673;
padding:12px;
display:flex;
justify-content:center;
gap:20px;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
}

.card{
background:white;
padding:15px;
border-radius:8px;
text-align:center;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.qty{
display:flex;
justify-content:center;
gap:10px;
margin-top:10px;
}

button{
background:#17a673;
color:white;
border:none;
padding:8px 12px;
border-radius:5px;
cursor:pointer;
}

</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="menu.html">Menu</a>
<a href="keranjang.html">Keranjang</a>
<a href="lokasi.html">Lokasi</a>
</nav>

<div class="container">

<h2>Menu Produk</h2>

<div class="menu">

<div class="card">
<h3>Es Teler Yummy</h3>

<div class="qty">
<button onclick="tambah('Es Teler Yummy',1)">+ Tambah</button>
</div>

</div>

<div class="card">
<h3>Es Coklat</h3>

<div class="qty">
<button onclick="tambah('Es Coklat',1)">+ Tambah</button>
</div>

</div>

<div class="card">
<h3>Rokupang</h3>

<div class="qty">
<button onclick="tambah('Rokupang',1)">+ Tambah</button>
</div>

</div>

</div>

</div>

<script>

function tambah(nama,jumlah){

let keranjang = JSON.parse(localStorage.getItem("keranjang")) || [];

let index = keranjang.findIndex(p => p.nama === nama);

if(index !== -1){

keranjang[index].jumlah += jumlah;

}else{

keranjang.push({nama:nama,jumlah:jumlah});

}

localStorage.setItem("keranjang",JSON.stringify(keranjang));

alert("Produk ditambahkan ke keranjang");

}

</script>

</body>
</html>
