<header>
<h1>Keranjang Pesanan</h1>
<p>Rokupang & Es Teler Yummy</p>
</header>

<div class="container">

<div id="list">
Belum ada pesanan
</div>

<br>

<button onclick="pesanWA()">Pesan Sekarang</button>

</div>

<footer>
<p>WhatsApp: 082217743964</p>
<p>© 2026 Rokupang & Es Teler Yummy</p>
</footer>

<script>

let keranjang = JSON.parse(localStorage.getItem("keranjang")) || [];

function tampil(){

let list = document.getElementById("list");

if(keranjang.length == 0){
list.innerHTML="Belum ada pesanan";
return;
}

let html="";

keranjang.forEach((item,i)=>{
html += (i+1)+". "+item+"<br>";
});

list.innerHTML=html;

}

function pesanWA(){

if(keranjang.length==0){
alert("Keranjang kosong");
return;
}

let pesan="Pesanan Rokupang & Es Teler Yummy:%0A";

keranjang.forEach((item,i)=>{
pesan += (i+1)+". "+item+"%0A";
});

window.open("https://wa.me/6282217743964?text="+pesan);

}

tampil();

</script>
